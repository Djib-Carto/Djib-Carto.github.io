<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum International des Jeunes · Conservation des Océans · Gaspé 2026</title>
<meta name="description" content="Carte interactive – 100 jeunes leaders de 22 pays réunis à Gaspé pour la conservation des océans.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/globe.gl@2"></script>
<style>
/* ─── TOKENS ──────────────────────────────────────────────────── */
:root{
  --abyss:   #020810;
  --deep:    #060f26;
  --glass:   rgba(4,12,32,.88);
  --border:  rgba(255,255,255,.08);
  --cyan:    #00f5d4;
  --blue:    #00bbf9;
  --gold:    #ffd60a;
  --coral:   #ff6b6b;
  --text:    #f0f4ff;
  --muted:   #7a8ba8;
  --font:    'Outfit',sans-serif;
  --r:       14px;
  --sh:      0 24px 60px rgba(0,0,0,.7);
}

/* ─── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--abyss);font-family:var(--font);color:var(--text)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,245,212,.25);border-radius:4px}

/* ─── ANIMATED OCEAN BACKGROUND ─────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(0,187,249,.06) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(0,245,212,.05) 0%, transparent 70%),
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6,15,38,1) 0%, rgba(2,8,16,1) 100%);
  animation: oceanShift 12s ease-in-out infinite alternate;
}
@keyframes oceanShift{
  from{background-position:0% 0%}
  to{background-position:100% 100%}
}

/* ─── GLOBE CONTAINER ─────────────────────────────────────────── */
#globe-wrap{position:fixed;inset:0;z-index:1}

/* ─── TOP HEADER ─────────────────────────────────────────────── */
#header{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;
  text-align:center;
}
.title-line1{
  font-size:clamp(.65rem,.9vw,.85rem);font-weight:600;letter-spacing:4px;
  text-transform:uppercase;color:var(--cyan);
  text-shadow:0 0 20px rgba(0,245,212,.6);
  margin-bottom:4px;
}
.title-line2{
  font-size:clamp(1rem,1.6vw,1.4rem);font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#fff 30%,var(--cyan) 70%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;
  margin-bottom:3px;
}
.title-line3{
  font-size:clamp(.6rem,.75vw,.72rem);font-weight:400;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);
}

/* ─── SIDEBAR (nations) ──────────────────────────────────────── */
#sidebar{
  position:fixed;top:50%;left:16px;transform:translateY(-50%);
  z-index:20;
  width:220px;max-height:calc(100vh - 160px);
  display:flex;flex-direction:column;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--sh);
  overflow:hidden;
}
.sb-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-head h2{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);}
.sb-head p{font-size:.64rem;color:var(--muted);margin-top:2px;}

.sb-search{
  padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;
}
.sb-search input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--font);
  font-size:.75rem;padding:6px 10px 6px 28px;
  transition:border-color .2s,box-shadow .2s;
}
.sb-search input:focus{outline:none;border-color:rgba(0,245,212,.4);box-shadow:0 0 0 2px rgba(0,245,212,.1);}
.sb-search svg{position:absolute;left:20px;top:50%;transform:translateY(-50%);opacity:.4;}

#nation-list{flex:1;overflow-y:auto;padding:6px 8px 8px;}

.nation-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:9px;cursor:pointer;
  border:1px solid transparent;margin-bottom:2px;
  transition:all .2s cubic-bezier(.16,1,.3,1);
}
.nation-item:hover{background:rgba(0,245,212,.06);border-color:rgba(0,245,212,.15);}
.nation-item.active{background:rgba(0,245,212,.1);border-color:rgba(0,245,212,.35);box-shadow:0 0 14px rgba(0,245,212,.08) inset;}
.nation-item.host{border-color:rgba(255,107,107,.2);}
.nation-item.host:hover,.nation-item.host.active{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.4);}

.nation-flag{width:28px;height:auto;border-radius:2px;flex-shrink:0;transition:transform .2s;}
.nation-item:hover .nation-flag,.nation-item.active .nation-flag{transform:scale(1.15);}
.nation-name{font-size:.8rem;font-weight:500;line-height:1.2;}
.nation-host-tag{font-size:.55rem;font-weight:700;color:var(--coral);text-transform:uppercase;letter-spacing:.5px;}

/* ─── CONTROLS (bottom center) ──────────────────────────────── */
#controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:8px;align-items:center;
  background:var(--glass);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:40px;
  padding:6px 10px;box-shadow:var(--sh);
}
.cbtn{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid transparent;
  color:var(--muted);padding:7px 14px;border-radius:30px;
  font-family:var(--font);font-size:.73rem;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.cbtn:hover{color:var(--cyan);border-color:rgba(0,245,212,.25);}
.cbtn.on{color:var(--cyan);border-color:rgba(0,245,212,.3);background:rgba(0,245,212,.07);}
.cbtn.tour-on{color:var(--coral);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.07);}
.style-sep{width:1px;height:24px;background:var(--border);}

/* ─── DETAIL CARD (hover & click) ───────────────────────────── */
#detail{
  position:fixed;right:20px;bottom:80px;z-index:20;
  width:360px;
  background:var(--glass);backdrop-filter:blur(24px) saturate(200%);
  border:1px solid var(--border);border-radius:18px;
  padding:24px;box-shadow:var(--sh);
  opacity:0;transform:translateY(20px) scale(.97);
  transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1);
  pointer-events:none;
}
#detail.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}

.d-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.d-flag-big{
  width: 90px;
  height: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  animation:flagBounce .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes flagBounce{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.d-info{flex:1;padding-left:14px;}
.d-country{font-size:1.25rem;font-weight:800;line-height:1.1;margin-bottom:4px;}
.d-capital{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.d-close{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--muted);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:16px;transition:all .2s;flex-shrink:0;
}
.d-close:hover{background:rgba(255,107,107,.15);color:var(--coral);border-color:rgba(255,107,107,.3);}

.d-ocean{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,187,249,.08);border:1px solid rgba(0,187,249,.2);
  border-radius:8px;padding:8px 12px;margin-bottom:14px;
  font-size:.78rem;
}
.d-ocean-icon{font-size:1.1rem;}
.d-ocean-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.d-ocean-val{font-size:.82rem;font-weight:600;color:var(--blue);}

.d-quote{
  background:rgba(2,8,20,.5);
  border-left:3px solid var(--cyan);
  padding:12px 14px;border-radius:0 8px 8px 0;
  font-size:.82rem;font-style:italic;line-height:1.6;color:#dde8ff;
  position:relative;overflow:hidden;
}
.d-quote::before{
  content:'\201C';position:absolute;top:-8px;right:8px;
  font-size:5rem;color:rgba(0,245,212,.05);font-style:normal;line-height:1;
}
.d-dist{
  margin-top:12px;text-align:right;
  font-size:.65rem;color:var(--muted);letter-spacing:.5px;
}
.d-dist strong{color:var(--cyan);}

/* ─── TOUR PROGRESS ─────────────────────────────────────────── */
#tour-bar{
  position:fixed;top:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--gold),var(--coral));
  width:0;z-index:100;opacity:0;
  transition:width 4.7s linear;
}
#tour-bar.run{opacity:1;}

/* ─── GASPÉ PIN ──────────────────────────────────────────────── */
.gaspe-pin{
  position:relative;cursor:default;
  display:flex;flex-direction:column;align-items:center;
}
.gaspe-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--coral);border:2.5px solid #fff;
  box-shadow:0 0 0 4px rgba(255,107,107,.25),0 0 20px rgba(255,107,107,.6);
  animation:gaspePulse 2s ease-in-out infinite;
}
@keyframes gaspePulse{
  0%,100%{box-shadow:0 0 0 4px rgba(255,107,107,.25),0 0 20px rgba(255,107,107,.6);}
  50%{box-shadow:0 0 0 8px rgba(255,107,107,.1),0 0 30px rgba(255,107,107,.9);}
}
.gaspe-label{
  background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.5);
  backdrop-filter:blur(8px);
  color:#fff;font-family:var(--font);font-size:.68rem;font-weight:700;
  padding:3px 9px;border-radius:10px;white-space:nowrap;
  margin-bottom:6px;letter-spacing:.5px;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* ─── FLAG MARKER (globe HTML elements) ─────────────────────── */
/* IMPORTANT: Globe.gl uses transform to position these elements.
   NEVER apply transform or animation-using-transform to the root .flag-pin.
   Animate only child elements, and use margin/padding, not transform. */
.flag-pin{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
  /* NO transform or animation here – would break Globe.gl positioning */
}
.flag-pin:hover .flag-emoji{
  width: 48px;
  box-shadow: 0 0 20px rgba(0,245,212,1), 0 0 40px rgba(0,245,212,.6);
}
.flag-emoji{
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid rgba(255,255,255,.85);
  display:block;
  box-shadow: 0 0 10px rgba(0,245,212,.5), 0 2px 8px rgba(0,0,0,.8);
  /* Float animation uses margin-top, NOT transform */
  animation:pinFloat 3s ease-in-out infinite;
  transition:width .15s, height .15s, box-shadow .15s, border-color .15s;
}
.flag-pin:hover .flag-emoji{
  width: 38px;
  height: 38px;
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,245,212,.9), 0 4px 12px rgba(0,0,0,.7);
}
@keyframes pinFloat{
  0%,100%{margin-top:0px;}
  50%{margin-top:-5px;}
}

/* ─── GLOBE polygon tooltip ──────────────────────────────────── */
.scene-tooltip{pointer-events:none !important;}

/* ─── UTILITIES ──────────────────────────────────────────────── */
.glow-cyan{filter:drop-shadow(0 0 8px rgba(0,245,212,.7));}
.glow-gold{filter:drop-shadow(0 0 8px rgba(255,214,10,.7));}

/* ─── CREDITS WATERMARK ──────────────────────────────────────── */
/* ─── CREDITS WATERMARK ──────────────────────────────────────── */
#credits-br{
  position:fixed;right:24px;bottom:20px;z-index:20;
  font-size:.7rem;color:var(--muted);letter-spacing:0.5px;
  font-weight:600;pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}

/* ─── ZOOM CONTROLS (top right) ──────────────────────────────── */
#zoom-ctrls {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 30;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  box-shadow: var(--sh);
}
#zoom-ctrls button {
  width: 36px;
  height: 36px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font);
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
#zoom-ctrls button:hover {
  background: var(--cyan);
  color: #020810;
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0, 245, 212, 0.5);
}
#zoom-ctrls button:active {
  transform: scale(0.95);
}
</style>
</head>

<!-- Globe -->
<div id="globe-wrap"></div>

<!-- Tour bar -->
<div id="tour-bar"></div>

<!-- Credits (bottom right signature) -->
<div id="credits-br">Créé par Moustapha Farah 2026</div>

<!-- Zoom Controls (top right) -->
<div id="zoom-ctrls">
  <button id="btn-zoom-in" title="Zoomer">+</button>
  <button id="btn-zoom-out" title="Dézoomer">-</button>
</div>

<!-- Header -->
<div id="header">
  <div class="title-line1">🌊 Forum International des Jeunes pour la Conservation des Océans</div>
  <div class="title-line2">GASPÉ, QUÉBEC · CANADA · 2026</div>
  <div class="title-line3">100 jeunes leaders · Un seul océan</div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-head">
    <h2>🌍 Délégations</h2>
    <p>Cliquer pour explorer</p>
  </div>
  <div class="sb-search">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Rechercher…">
  </div>
  <div id="nation-list"></div>
</div>

<!-- Controls -->
<div id="controls">

  <button class="cbtn" id="btn-night">🌙 Nuit</button>
  <button class="cbtn" id="btn-sat">🛰 Satellite</button>

  <button class="cbtn" id="btn-tour">✈ Voyage des Nations</button>
  <div class="style-sep"></div>
  <button class="cbtn" id="btn-reset">⌂ Vue d'ensemble</button>
</div>

<!-- Detail card -->
<div id="detail">

    <img id="d-flag" class="d-flag-big" src="" alt="Drapeau">

  </div>
  <div class="d-quote" id="d-quote">—</div>
  <div class="d-dist">Distance jusqu'à Gaspé : <strong id="d-dist">—</strong></div>
</div>

<!-- Inline Data to bypass browser cache -->

    lat: 36.8065, lng: 10.1815,
    delegates: 4,
    ocean: "Méditerranée",
    quote: "La Méditerranée est notre histoire commune. Nous militons pour une mer sans microplastiques ni pollution."
  },
  {
    id: "mali", name: "Mali", nameEn: "Mali",
    capital: "Bamako", code: "ML",
    lat: 12.6392, lng: -8.0029,
    delegates: 4,
    ocean: "Bassin du fleuve Niger (eaux douces)",
    quote: "L'eau est une ressource mondiale partagée. Protéger l'océan, c'est sauvegarder le cycle hydrologique mondial."
  },
  {
    id: "france", name: "France", nameEn: "France",
    capital: "Paris", code: "FR",
    lat: 48.8566, lng: 2.3522,
    delegates: 6,
    ocean: "Atlantique",
    quote: "La mer n'est pas un espace de division, mais le lien bleu qui unit nos destins climatiques et écologiques."
  },
  {
    id: "brazil", name: "Brésil", nameEn: "Brazil",
    capital: "Brasilia", code: "BR",
    lat: -15.7975, lng: -47.8919,
    delegates: 5,
    ocean: "Atlantique",
    quote: "De l'Amazone à l'Atlantique, la santé de nos fleuves dicte celle de nos océans. Tout est connecté."
  },
  {
    id: "ecuador", name: "Équateur", nameEn: "Ecuador",
    capital: "Quito", code: "EC",
    lat: -0.1807, lng: -78.4678,
    delegates: 4,
    ocean: "Pacifique (Galápagos)",
    quote: "Les îles Galápagos sont un trésor de l'humanité. Protéger leurs eaux, c'est sauvegarder la vie sur Terre."
  },
  {
    id: "uruguay", name: "Uruguay", nameEn: "Uruguay",
    capital: "Montevideo", code: "UY",
    lat: -34.9011, lng: -56.1645,
    delegates: 4,
    ocean: "Atlantique",
    quote: "Nous promouvons la pêche durable et les aires marines protégées pour un Atlantique sud en bonne santé."
  },
  {
    id: "indonesia", name: "Indonésie", nameEn: "Indonesia",
    capital: "Jakarta", code: "ID",
    lat: -6.2088, lng: 106.8456,
    delegates: 5,
    ocean: "Pacifique & Indien",
    quote: "En tant que plus grand archipel du monde, protéger le Triangle de Corail est une mission vitale pour notre génération."
  },
  {
    id: "philippines", name: "Philippines", nameEn: "Philippines",
    capital: "Manille", code: "PH",
    lat: 14.5995, lng: 120.9842,
    delegates: 5,
    ocean: "Pacifique",
    quote: "Au cœur de la biodiversité marine mondiale, nous défendons nos récifs contre la surpêche et l'acidification."
  }
];
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════════════════════ */
const TEX = {
  night:     '//unpkg.com/three-globe/example/img/earth-night.jpg',
  satellite: '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
  bump:      '//unpkg.com/three-globe/example/img/earth-topology.png'
};

/* GeoJSON sources – first that loads wins */
const GEO_SOURCES = [
  'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/countries.geojson',
  'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
  'https://unpkg.com/three-globe/example/img/ne_110m_admin_0_countries.geojson'
];

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let globe, geoData = null;
let activeId = null;
let spinning = true;
let currentTex = 'night';
let tourOn = false, tourTimer = null, tourIdx = 0;

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  addFlags();          // compute flag emojis
  addDistances();      // compute haversine distances
  renderSidebar(COUNTRIES_DATA);
  buildGlobe();
  wireUI();
});

/* ═══════════════════════════════════════════════════════════════
   ENRICH DATA
═══════════════════════════════════════════════════════════════ */
function addFlags() {
  COUNTRIES_DATA.forEach(c => {
    // Generate low-res and high-res image URLs using flagcdn
    c.flagUrl = `https://flagcdn.com/w40/${c.code.toLowerCase()}.png`;
    c.flagUrlMedium = `https://flagcdn.com/w80/${c.code.toLowerCase()}.png`;
    c.flagUrlLarge = `https://flagcdn.com/w160/${c.code.toLowerCase()}.png`;
  });
}
function addDistances() {
  COUNTRIES_DATA.forEach(c => {
    c.dist = haversine(c.lat, c.lng, DESTINATION.lat, DESTINATION.lng);
  });
}

/* ═══════════════════════════════════════════════════════════════
   GLOBE CONSTRUCTION
═══════════════════════════════════════════════════════════════ */
function buildGlobe() {
  const wrap = document.getElementById('globe-wrap');

  globe = Globe()(wrap)
    .width(wrap.clientWidth)
    .height(wrap.clientHeight)
    .globeImageUrl(TEX.night)
    .bumpImageUrl(TEX.bump)
    .backgroundColor('#020810')
    .showAtmosphere(true)
    .atmosphereColor('rgba(0,187,249,.7)')
    .enablePointerInteraction(true);

  /* Controls */
  const ctrl = globe.controls();
  ctrl.autoRotate = true;
  ctrl.autoRotateSpeed = 0.5;
  ctrl.minDistance = 130;
  ctrl.maxDistance = 500;

  /* Build layers */
  buildArcs(null);
  buildMarkers();
  loadGeoJSON();

  /* Resize */
  window.addEventListener('resize', () =>
    globe.width(wrap.clientWidth).height(wrap.clientHeight));

  /* Home view – centred on Atlantic / Africa */
  setTimeout(() =>
    globe.pointOfView({ lat: 18, lng: -8, altitude: 2.4 }, 1500), 700);
}

/* ── ARCS ────────────────────────────────────────────────────── */
function buildArcs(selectedId) {
  globe
    .arcsData(COUNTRIES_DATA.map(c => ({
      slat: c.lat, slng: c.lng,
      elat: DESTINATION.lat, elng: DESTINATION.lng,
      isActive: c.id === selectedId,
      id: c.id
    })))
    .arcStartLat('slat').arcStartLng('slng')
    .arcEndLat('elat').arcEndLng('elng')
    .arcColor(d => {
      if (d.isActive) return ['#ffd60a','#ff6b6b'];
      if (selectedId) return ['rgba(0,245,212,.06)','rgba(0,245,212,.06)'];
      return ['rgba(0,245,212,.5)','rgba(0,187,249,.3)'];
    })
    .arcStroke(d => d.isActive ? 2.4 : selectedId ? 0.4 : 0.8)
    .arcAltitude(d => {
      const dx = d.slat - d.elat, dy = d.slng - d.elng;
      return Math.min(0.6, Math.max(0.12, Math.sqrt(dx*dx+dy*dy)*0.005));
    })
    .arcDashLength(0.4)
    .arcDashGap(1.2)
    .arcDashAnimateTime(d => {
      const dx = d.slat - d.elat, dy = d.slng - d.elng;
      return Math.max(800, Math.min(3500, Math.sqrt(dx*dx+dy*dy)*28));
    });
}

/* ── HTML MARKERS (flag pins) ────────────────────────────────── */
function buildMarkers() {
  const data = [
    { lat: DESTINATION.lat, lng: DESTINATION.lng, isGaspe: true },
    ...COUNTRIES_DATA.map((c, i) => ({ ...c, isGaspe: false, idx: i }))
  ];

  globe
    .htmlElementsData(data)
    .htmlElement(d => {
      const el = document.createElement('div');
      if (d.isGaspe) {
        el.className = 'gaspe-pin';
        el.innerHTML = `<div class="gaspe-label">📍 Gaspé, QC</div><div class="gaspe-dot"></div>`;
        return el;
      }
      // Root element: NO transform / animation (Globe.gl uses transform to position it)
      el.className = 'flag-pin';
      el.title = d.name;

      // Inner img element: uses margin-top animation
      const img = document.createElement('img');
      img.className = 'flag-emoji';
      img.src = d.flagUrlMedium;
      img.alt = d.name;
      img.style.animationDelay = ((d.idx * 0.35) % 3) + 's';
      el.appendChild(img);

      el.addEventListener('click', e => { e.stopPropagation(); selectCountry(d.id); });
      return el;
    })
    .htmlAltitude(0.055);
}

/* ── GEOJSON POLYGON BORDERS ─────────────────────────────────── */
function loadGeoJSON() {
  let idx = 0;
  function next() {
    if (idx >= GEO_SOURCES.length) return;
    fetch(GEO_SOURCES[idx++])
      .then(r => { if (!r.ok) throw 0; return r.json(); })
      .then(applyGeoJSON)
      .catch(next);
  }
  next();
}

function applyGeoJSON(geojson) {
  geoData = geojson;

  /* Build lookup tables */
  const byCode = {}, byName = {};
  COUNTRIES_DATA.forEach(c => {
    byCode[c.code] = c;
    byName[c.name.toLowerCase()] = c;
    byName[c.nameEn.toLowerCase()] = c;
  });
  /* Extra aliases for name mismatches between GeoJSON sources */
  const ALIASES = {
    'ivory coast': 'cote_divoire',
    "cote d'ivoire": 'cote_divoire',
    'cape verde': 'cap_vert',
    'guinea-bissau': 'guinee_bissau',
    'gambia': 'gambie',
    'the gambia': 'gambie',
    'republic of the congo': 'congo',
    'congo': 'congo',
    'ecuador': 'ecuador',
    'brazil': 'brazil',
  };

  geojson.features.forEach(f => {
    const p = f.properties;
    const iso = (f.id || p.ISO_A2 || p.iso_a2 || p.ISO2 || '').toString().toUpperCase().trim();
    const name = (p.name || p.NAME || p.ADMIN || '').toLowerCase().trim();
    const aliasId = ALIASES[name];
    const mc = byCode[iso] || byName[name] ||
                (aliasId ? COUNTRIES_DATA.find(c => c.id === aliasId) : null);

    if (mc) {
      p._id = mc.id; p._ok = true;
      p._flag = mc.flag; p._cap = mc.capital;
      p._ocean = mc.ocean; p._quote = mc.quote;
    } else {
      p._ok = false;
    }
  });

  renderPolygons();
}

function renderPolygons() {
  if (!geoData) return;
  globe
    .polygonsData(geoData.features)
    /* ONLY participant countries are visible */
    .polygonCapColor(f => {
      if (!f.properties._ok) return 'rgba(0,0,0,0)';          /* hidden */
      if (f.properties._id === 'canada') {
        return f.properties._id === activeId
          ? 'rgba(255,107,107,.8)' : 'rgba(255,107,107,.32)';
      }
      return f.properties._id === activeId
        ? 'rgba(0,245,212,.82)' : 'rgba(0,245,212,.18)';
    })
    .polygonSideColor(f => {
      if (!f.properties._ok) return 'rgba(0,0,0,0)';
      return f.properties._id === 'canada'
        ? 'rgba(255,107,107,.22)' : 'rgba(0,245,212,.15)';
    })
    .polygonStrokeColor(f => {
      if (!f.properties._ok) return 'rgba(0,0,0,0)';          /* hidden */
      if (f.properties._id === 'canada') return 'rgba(255,107,107,.9)';
      return f.properties._id === activeId ? '#00f5d4' : 'rgba(0,245,212,.45)';
    })
    .polygonAltitude(f => {
      if (!f.properties._ok) return 0;
      if (f.properties._id === activeId) return 0.1;
      return f.properties._id === 'canada' ? 0.04 : 0.02;
    })
    /* Hover popup – NO delegate counts */
    .polygonLabel(f => {
      if (!f.properties._ok) return '';
      return buildPopup(f);
    })
    .onPolygonClick((f, _e, _ll) => {
      if (!f.properties._ok) return;
      if (tourOn) stopTour();
      selectCountry(f.properties._id);
    });
}

function refreshPolygons() {
  if (!geoData) return;
  globe
    .polygonCapColor(f => {
      if (!f.properties._ok) return 'rgba(0,0,0,0)';
      if (f.properties._id === 'canada')
        return f.properties._id === activeId ? 'rgba(255,107,107,.8)' : 'rgba(255,107,107,.32)';
      return f.properties._id === activeId ? 'rgba(0,245,212,.82)' : 'rgba(0,245,212,.18)';
    })
    .polygonStrokeColor(f => {
      if (!f.properties._ok) return 'rgba(0,0,0,0)';
      if (f.properties._id === 'canada') return 'rgba(255,107,107,.9)';
      return f.properties._id === activeId ? '#00f5d4' : 'rgba(0,245,212,.45)';
    })
    .polygonAltitude(f => {
      if (!f.properties._ok) return 0;
      if (f.properties._id === activeId) return 0.1;
      return f.properties._id === 'canada' ? 0.04 : 0.02;
    });
}

/* ── POPUP HTML (hover on polygon, NO delegate count) ────────── */
function buildPopup(f) {
  const c = COUNTRIES_DATA.find(x => x.id === f.properties._id) || {};
  const isCA = f.properties._id === 'canada';
  const ac = isCA ? '#ff6b6b' : '#00f5d4';
  const q = (c.quote || '').substring(0, 160);
  return `
  <div style="
    font-family:Outfit,sans-serif;
    background:rgba(4,10,28,.96);
    border:1px solid ${ac};
    border-radius:16px;padding:18px 20px;
    min-width:260px;max-width:310px;
    box-shadow:0 16px 50px rgba(0,0,0,.8),0 0 30px rgba(0,245,212,.06);
    pointer-events:none;
  ">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <img src="${c.flagUrlMedium}" width="50" style="border-radius:4px;border:1px solid rgba(255,255,255,.15);box-shadow:0 2px 10px rgba(0,0,0,.5);" alt="Drapeau">
      <div>
        <div style="font-weight:800;font-size:1.05rem;color:#f0f4ff;margin-bottom:3px">${c.name||''}</div>
        <div style="font-size:.65rem;color:#7a8ba8;text-transform:uppercase;letter-spacing:1.5px">${f.properties._cap||c.capital||''}</div>
      </div>
    </div>
    <div style="background:rgba(0,187,249,.07);border:1px solid rgba(0,187,249,.18);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:1.1rem">🌊</span>
      <div>
        <div style="font-size:.58rem;color:#7a8ba8;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Bassin océanique</div>
        <div style="font-size:.82rem;font-weight:600;color:#00bbf9">${c.ocean||''}</div>
      </div>
    </div>
    <div style="background:rgba(0,0,0,.3);border-left:3px solid ${ac};padding:10px 12px;border-radius:0 8px 8px 0;font-size:.8rem;font-style:italic;line-height:1.55;color:#dde8ff">${q}${c.quote&&c.quote.length>160?'…':''}</div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════════════════════════ */
function selectCountry(id) {
  if (activeId === id) { clearSelection(); return; }
  activeId = id;

  /* Sidebar highlight */
  document.querySelectorAll('.nation-item').forEach(e => e.classList.remove('active'));
  const li = document.getElementById('ni-' + id);
  if (li) { li.classList.add('active'); li.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  const c = COUNTRIES_DATA.find(x => x.id === id);
  if (!c) return;

  /* Camera */
  globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 1.2 }, 1800);
  globe.controls().autoRotate = false;
  document.getElementById('btn-rotate').classList.remove('on');

  /* Arcs & polygons */
  buildArcs(id);
  refreshPolygons();

  /* Detail card – re-trigger flag animation */
  document.getElementById('d-flag').src = c.flagUrlLarge;
  document.getElementById('d-flag').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('d-flag').style.animation = '';
  });
  document.getElementById('d-country').textContent = c.name;
  document.getElementById('d-capital').textContent  = c.capital;
  document.getElementById('d-ocean').textContent   = c.ocean;
  document.getElementById('d-quote').textContent   = c.quote;
  document.getElementById('d-dist').textContent    = Math.round(c.dist).toLocaleString('fr-CA') + ' km';
  document.getElementById('detail').classList.add('show');
}

function clearSelection() {
  activeId = null;
  document.querySelectorAll('.nation-item').forEach(e => e.classList.remove('active'));
  document.getElementById('detail').classList.remove('show');
  buildArcs(null);
  refreshPolygons();
  if (spinning) {
    globe.controls().autoRotate = true;
    document.getElementById('btn-rotate').classList.add('on');
  }
  globe.pointOfView({ lat: 18, lng: -8, altitude: 2.4 }, 1500);
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════ */
function renderSidebar(arr) {
  const ul = document.getElementById('nation-list');
  ul.innerHTML = '';
  /* Sort the 22 participant countries alphabetically */
  const sorted = [...arr].sort((a,b) => a.name.localeCompare(b.name,'fr'));
  sorted.forEach(c => {
    const el = document.createElement('div');
    el.className = 'nation-item';
    el.id = 'ni-' + c.id;
    el.innerHTML = `
      <img class="nation-flag" src="${c.flagUrl}" alt="${c.name}" style="width:24px;height:auto;border-radius:2px;border:1px solid rgba(255,255,255,.1);">
      <div>
        <div class="nation-name">${c.name}</div>
      </div>`;
    el.addEventListener('click', () => { if (tourOn) stopTour(); selectCountry(c.id); });
    ul.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════════════
   UI WIRING
═══════════════════════════════════════════════════════════════ */
function wireUI() {
  /* Rotation */
  document.getElementById('btn-rotate').addEventListener('click', function() {
    if (tourOn) { stopTour(); return; }
    spinning = !spinning;
    globe.controls().autoRotate = spinning;
    this.classList.toggle('on', spinning);
  });

  /* Reset */
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (tourOn) stopTour();
    clearSelection();
  });

  /* Tour */
  document.getElementById('btn-tour').addEventListener('click', () =>
    tourOn ? (stopTour(), clearSelection()) : startTour());

  /* Globe style */
  document.getElementById('btn-night').addEventListener('click', () => {
    globe.globeImageUrl(TEX.night).atmosphereColor('rgba(0,187,249,.7)');
    currentTex = 'night';
  });
  document.getElementById('btn-sat').addEventListener('click', () => {
    globe.globeImageUrl(TEX.satellite).atmosphereColor('rgba(200,220,255,.5)');
    currentTex = 'satellite';
  });

  /* Zoom In & Zoom Out Logic */
  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    const pov = globe.pointOfView();
    // Reduce altitude to zoom in, limit to minimum altitude of 1.25
    globe.pointOfView({ altitude: Math.max(1.25, pov.altitude - 0.25) }, 350);
  });
  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    const pov = globe.pointOfView();
    // Increase altitude to zoom out, limit to maximum altitude of 4.5
    globe.pointOfView({ altitude: Math.min(4.5, pov.altitude + 0.25) }, 350);
  });

  /* Close detail */
  document.getElementById('d-close').addEventListener('click', () => {
    if (tourOn) stopTour();
    clearSelection();
  });

  /* Search */
  document.getElementById('search').addEventListener('input', function() {
    const t = this.value.toLowerCase().trim();
    renderSidebar(
      t ? COUNTRIES_DATA.filter(c =>
        c.name.toLowerCase().includes(t) ||
        c.nameEn.toLowerCase().includes(t) ||
        c.capital.toLowerCase().includes(t))
      : COUNTRIES_DATA
    );
  });
}

/* ═══════════════════════════════════════════════════════════════
   GUIDED TOUR
═══════════════════════════════════════════════════════════════ */
function startTour() {
  tourOn = true; tourIdx = 0;
  const btn = document.getElementById('btn-tour');
  btn.classList.add('tour-on');
  btn.textContent = '■ Arrêter le voyage';
  globe.controls().autoRotate = false;
  document.getElementById('btn-rotate').classList.remove('on');

  /* Countries except Canada (host) */
  const list = COUNTRIES_DATA.filter(c => c.id !== 'canada')
                              .sort((a,b) => a.name.localeCompare(b.name,'fr'));
  function step() {
    if (!tourOn || tourIdx >= list.length) { stopTour(); clearSelection(); return; }
    selectCountry(list[tourIdx++].id);
    /* Animate tour bar */
    const bar = document.getElementById('tour-bar');
    bar.style.transition = 'none';
    bar.style.width = '0';
    bar.classList.add('run');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bar.style.transition = 'width 4.7s linear';
      bar.style.width = '100%';
    }));
    tourTimer = setTimeout(step, 5000);
  }
  step();
}

function stopTour() {
  tourOn = false;
  if (tourTimer) { clearTimeout(tourTimer); tourTimer = null; }
  const btn = document.getElementById('btn-tour');
  btn.classList.remove('tour-on');
  btn.textContent = '✈ Voyage des Nations';
  const bar = document.getElementById('tour-bar');
  bar.classList.remove('run');
  bar.style.width = '0';
}

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function haversine(la1,lo1,la2,lo2){
  const R=6371,d2r=Math.PI/180;
  const dL=(la2-la1)*d2r,dO=(lo2-lo1)*d2r;
  const a=Math.sin(dL/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
