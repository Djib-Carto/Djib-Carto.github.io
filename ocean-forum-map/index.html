<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum International des Jeunes · Conservation des Océans · Gaspé 2026</title>
<meta name="description" content="Carte interactive – 100 jeunes leaders réunis à Gaspé pour la conservation des océans.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<!-- 3D Globe Library -->
<script src="https://unpkg.com/globe.gl@2"></script>

<!-- External Custom CSS -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Globe Canvas -->
<div id="globe-wrap"></div>

<!-- Tour Progress Bar -->
<div id="tour-bar"></div>

<!-- Footer Signature (Bottom Right) -->
<div id="credits-br">Créé par Moustapha Farah 2026</div>

<!-- Zoom Controls Panel (Top Right) -->
<div id="zoom-ctrls">
  <button id="btn-zoom-in" title="Zoomer">+</button>
  <button id="btn-zoom-out" title="Dézoomer">-</button>
</div>

<!-- Main Header Overlay -->
<div id="header">
  <div class="title-line1">🌊 Forum International des Jeunes pour la Conservation des Océans</div>
  <div class="title-line2">GASPÉ, QUÉBEC · CANADA · 2026</div>
  <div class="title-line3">100 jeunes leaders · Un seul océan</div>
</div>

<!-- Sidebar List -->
<div id="sidebar">
  <div class="sb-head">
    <h2>🌍 Délégations</h2>
    <p>Cliquer pour explorer</p>
  </div>
  <div class="sb-search">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Rechercher…">
  </div>
  <div id="nation-list"></div>
</div>

<!-- Controls Bar (Bottom Center) -->
<div id="controls">
  <button class="cbtn on" id="btn-rotate">⟳ Rotation</button>
  <div class="style-sep"></div>
  <button class="cbtn" id="btn-night">🌙 Nuit</button>
  <button class="cbtn" id="btn-sat">🛰 Satellite</button>
  <div class="style-sep"></div>
  <button class="cbtn" id="btn-tour">✈ Voyage des Nations</button>
  <div class="style-sep"></div>
  <button class="cbtn" id="btn-reset">⌂ Vue d'ensemble</button>
</div>

<!-- Detail Information Card (Popup) -->
<div id="detail">
  <div class="d-head">
    <img id="d-flag" class="d-flag-big" src="" alt="Drapeau">
    <div class="d-info">
      <div class="d-country" id="d-country">—</div>
      <div class="d-capital" id="d-capital">—</div>
    </div>
    <button class="d-close" id="d-close" title="Fermer">✕</button>
  </div>
  <div class="d-ocean">
    <span class="d-ocean-icon">🌊</span>
    <div>
      <div class="d-ocean-label">Bassin océanique</div>
      <div class="d-ocean-val" id="d-ocean">—</div>
    </div>
  </div>
  <div class="d-quote" id="d-quote">—</div>
  <div class="d-dist">Distance jusqu'à Gaspé : <strong id="d-dist">—</strong></div>
</div>

<!-- External Custom JS (Containing Countries dataset and logic) -->
<script src="js/app.js"></script>
</body>
</html>
